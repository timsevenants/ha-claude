name: "Claude Terminal"
description: "Web terminal met Anthropic's Claude Code CLI en persistente login"
version: "1.1.4"
slug: "claude_terminal"
init: false

arch:
  - aarch64
  - amd64
  - armv7

url: "https://github.com/timsevenants/ha-claude"

# Toegang via de HA sidebar (ingress), geen poort nodig naar buiten
ingress: true
ingress_port: 7681
panel_icon: mdi:robot-happy-outline
panel_title: "Claude Terminal"
panel_admin: true

# Optionele directe poort (handig om buiten ingress te testen)
ports:
  7681/tcp: null
ports_description:
  7681/tcp: "Web terminal (niet nodig bij ingress)"

options:
  auto_launch_claude: true
  ha_smart_context: true
  enable_ha_mcp: true
  persistent_apk_packages: []
  persistent_pip_packages: []

schema:
  auto_launch_claude: bool?
  ha_smart_context: bool?
  enable_ha_mcp: bool?
  persistent_apk_packages:
    - str
  persistent_pip_packages:
    - str

# Geef Claude toegang tot de HA-configuratiemap (YAML bewerken)
map:
  - config:rw

# HA API's beschikbaar maken (states opvragen, services aanroepen)
hassio_api: true
hassio_role: manager
homeassistant_api: true
auth_api: true

startup: services
webui: http://[HOST]:[PORT:7681]/
